<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Tally Sticks</title>
  <link rel="stylesheet" href="home.css">
  <script src="home.js" defer></script>
</head>
<body>

  <!-- Top Ribbon Navigation -->
  <header class="ribbon-nav">
    <nav>
      <a href="#" class="nav-item active">Dashboard</a>
      <a href="#" class="nav-item">Backlog</a>
      <a href="#" class="nav-item">Task Tracker</a>
      <a href="#" class="nav-item">Archive</a>
    </nav>
  </header>

  <!-- Main Dashboard Workspace -->
  <main class="dashboard-grid">
    
    <!-- Row 1: High-Level Metrics -->
    <div class="card metric-card">
      <h3>Active Projects</h3>
      <div class="metric-value"></div>
    </div>

    <div class="card metric-card">
      <h3>Total Active Work Items</h3>
      <div class="metric-value"></div>
    </div>

    <!-- Row 2: Core Workload & Communication -->
    <div class="card main-feed-card">
      <h3>Active Projects Feed</h3>
      <ul class="project-list">
        <!-- Project items inject here -->
      </ul>
    </div>

    <div class="card inbox-card">
      <h3>Inbox Preview</h3>
      <ul class="inbox-list">
        <!-- Notifications inject here -->
      </ul>
    </div>

    <!-- Row 3: Human Element / Contributors -->
    <div class="card team-card">
      <h3>Team List</h3>
      <ul class="team-list-items">
        <!-- Team members inject here -->
      </ul>
    </div>

    <div class="card contributors-card">
      <h3>Contributor List</h3>
      <div class="contributor-avatars">
        <!-- Avatars inject here -->
      </div>
    </div>

  </main>

</body>
</html>
